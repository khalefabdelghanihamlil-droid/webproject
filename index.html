<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NexShop - Login to access your digital marketplace for Electronics, Clothing and Books.">
    <title>NexShop — Login</title>

    <!-- External CSS stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-page">

    <!-- ========== LOGIN CARD ========== -->
    <main class="login-container">

        <!-- Store branding: logo + title -->
        <div class="login-brand">
            <img src="images/logo.png" alt="NexShop Logo" class="login-logo" id="login-logo">
            <h1 class="login-store-name">NexShop</h1>
            <p class="login-tagline">Your Digital Marketplace</p>
        </div>

        <!-- Error message — hidden by default, shown via JS when ?error=1 is in URL -->
        <div class="error-message" id="error-message" style="display:none;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Invalid login or password. Please try again.
        </div>

        <!-- Login form — POST action to login.php -->
        <form action="login.php" method="POST" id="login-form">

            <!-- Username / Login field -->
            <div class="form-group">
                <label for="login">
                    <i class="fa-solid fa-user"></i> Login
                </label>
                <input
                    type="text"
                    id="login"
                    name="login"
                    placeholder="Enter your login"
                    required
                    autocomplete="username"
                >
            </div>

            <!-- Password field -->
            <div class="form-group">
                <label for="password">
                    <i class="fa-solid fa-lock"></i> Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn-login" id="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>

        </form>

    </main><!-- /.login-container -->

    <!-- External JavaScript -->
    <script src="script.js"></script>

</body>
</html>
